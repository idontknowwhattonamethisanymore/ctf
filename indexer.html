<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Assistant</title>

<style>
body{
  background:#342b69;
  color:#ab0e38;
  font-family:"Comic Sans";
  margin:0;
}

header{
  background:#839ff2;
  padding:20px;
  text-align:center;
  font-size:22px;
}

.container{
  padding:20px;
}

.chat-box{
  background:#1d2561;
  border:1px solid #334155;
  padding:15px;
  height:400px;
  overflow-y:auto;
  margin-bottom:10px;
}

.message{
  margin-bottom:10px;
}

.user{
  color:#6adb53;
}

.bot{
  color:#b6bd31;
}

input{
  width:80%;
  padding:10px;
  background:#1d2561;
  border:1px solid #334155;
  color:white;
}

button{
  padding:10px;
  background:#f5370c;
  border:none;
  color:white;
  cursor:pointer;
}

button:hover{
  background:#f5370c;
}

</style>
</head>

<body>

<header>
AI Assistant<br>
<strong>Try to retrieve the hidden flag.</strong>
</header>

<div class="container">

<div class="chat-box" id="chat"></div>

<input id="userInput" placeholder="Ask Chimer...">
<button onclick="sendMessage()">Send</button>

</div>

<script>

function appendMessage(sender,text){

  const chat=document.getElementById("chat")

  const div=document.createElement("div")
  div.className="message "+sender
  div.innerText=text

  chat.appendChild(div)
  chat.scrollTop=chat.scrollHeight
}

async function sendMessage(){

  const input=document.getElementById("userInput")
  const message=input.value.trim()

  if(!message)return

  appendMessage("user","You: "+message)

  input.value=""

  try{

    const response=await fetch("/api/chat",{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        message:message
      })
    })

    const data=await response.json()

    appendMessage("bot","Chimer: "+data.reply)

  }catch(err){

    appendMessage("bot","error")

  }
}

</script>

</body>
</html>
